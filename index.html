<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0057b7">
  <meta name="description" content="Marta">
  <title>Marta</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="sky" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="cursor" aria-hidden="true"></div>
  <div class="trail" aria-hidden="true"></div>
  <div class="hearts" aria-hidden="true"></div>

  <main class="stage" aria-label="Marta">
    <section class="name-mark">
      <p class="quiet">martoshniy.com</p>
      <h1>Marta</h1>
      <div class="line" aria-hidden="true"></div>
    </section>
  </main>

  <script>
    const cursor = document.querySelector('.cursor');
    const trail = document.querySelector('.trail');
    const hearts = document.querySelector('.hearts');
    const canHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const heartClasses = ['heart-blue', 'heart-gold', 'heart-light'];

    function burstHearts(x, y) {
      const amount = reduceMotion ? 10 : 34;

      for (let i = 0; i < amount; i += 1) {
        const heart = document.createElement('span');
        const angle = (Math.PI * 2 * i) / amount + Math.random() * 0.65;
        const distance = 72 + Math.random() * 190;
        const size = 12 + Math.random() * 34;
        const spin = -260 + Math.random() * 520;

        heart.className = heartClasses[i % heartClasses.length];
        heart.textContent = '♥';
        heart.style.left = `${x}px`;
        heart.style.top = `${y}px`;
        heart.style.fontSize = `${size}px`;
        heart.style.setProperty('--x', `${Math.cos(angle) * distance}px`);
        heart.style.setProperty('--y', `${Math.sin(angle) * distance - 80}px`);
        heart.style.setProperty('--spin', `${spin}deg`);
        heart.style.setProperty('--delay', `${Math.random() * 90}ms`);
        hearts.appendChild(heart);
        setTimeout(() => heart.remove(), 1550);
      }
    }

    if (canHover) {
      document.body.classList.add('has-cursor');

      window.addEventListener('pointermove', (event) => {
        const x = event.clientX;
        const y = event.clientY;
        cursor.style.left = `${x}px`;
        cursor.style.top = `${y}px`;

        if (reduceMotion || Math.random() < 0.72) return;

        const spark = document.createElement('span');
        spark.style.left = `${x}px`;
        spark.style.top = `${y}px`;
        spark.style.setProperty('--drift-x', `${(Math.random() - 0.5) * 44}px`);
        spark.style.setProperty('--drift-y', `${-18 - Math.random() * 34}px`);
        spark.className = Math.random() > 0.5 ? 'blue' : 'gold';
        trail.appendChild(spark);
        setTimeout(() => spark.remove(), 900);
      });

      window.addEventListener('pointerleave', () => {
        cursor.style.left = '-100px';
        cursor.style.top = '-100px';
      });
    }

    window.addEventListener('pointerdown', (event) => {
      burstHearts(event.clientX, event.clientY);
    });
  </script>
</body>
</html>
